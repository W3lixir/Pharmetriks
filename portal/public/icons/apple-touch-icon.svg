<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="Pharmetriks">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#977DFF"/>
      <stop offset="55%" stop-color="#0033FF"/>
      <stop offset="100%" stop-color="#0600AB"/>
    </linearGradient>
    <linearGradient id="cross" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2E6EE"/>
    </linearGradient>
  </defs>
  <!-- iOS Springboard applies its own rounded mask, so full bleed is fine -->
  <rect width="180" height="180" fill="url(#bg)"/>
  <g transform="translate(90 90)">
    <rect x="-11" y="-44" width="22" height="88" rx="7.5" fill="url(#cross)"/>
    <rect x="-44" y="-11" width="88" height="22" rx="7.5" fill="url(#cross)"/>
  </g>
</svg>
