<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Pharmetriks">
  <!-- maskable: cross sits inside the 80% safe zone (centered at 256, max radius 205) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#977DFF"/>
      <stop offset="55%" stop-color="#0033FF"/>
      <stop offset="100%" stop-color="#0600AB"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.25" cy="0.2" r="0.7">
      <stop offset="0%"  stop-color="#FFCCF2" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#FFCCF2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cross" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2E6EE"/>
    </linearGradient>
  </defs>

  <!-- full-bleed background (will be cropped by launcher mask) -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" fill="url(#glow)"/>
  <path d="M0 0 H512 V210 Q256 340 0 210 Z" fill="#FFFFFF" opacity="0.06"/>

  <!-- Smaller emblem inside safe zone -->
  <g transform="translate(256 256)">
    <rect x="-26" y="-104" width="52" height="208" rx="18" fill="url(#cross)"/>
    <rect x="-104" y="-26" width="208" height="52" rx="18" fill="url(#cross)"/>
  </g>
</svg>
